name: Bug report
description: Something misbehaves — a crash, a wrong tool result, a bad schema.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you ran, what you expected, what you got. Include log lines (stderr) if you have them — but redact database URLs and any real listing data.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `mlsgrid-mcp version`
    validations:
      required: true
  - type: input
    id: contract
    attributes:
      label: Schema contract version
      description: The `contract` value from `mlsgrid-mcp check`, or your mlsgrid-sync version
  - type: dropdown
    id: client
    attributes:
      label: MCP client
      options:
        - Claude Code
        - Claude Desktop
        - Other / direct protocol
  - type: textarea
    id: tool
    attributes:
      label: Tool call
      description: Which tool, and the arguments you passed (redact anything identifying a real listing or person).
      render: json
